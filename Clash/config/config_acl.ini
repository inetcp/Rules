[custom]
; 参考 ACL4SSR_Online_Full.ini

; 自用规则优先
ruleset=🏠 Home,https://raw.githubusercontent.com/inetcp/Rules/main/Clash/Home.list
ruleset=🏢 Work,https://raw.githubusercontent.com/inetcp/Rules/main/Clash/Work.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/inetcp/Rules/main/Clash/Direct.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/inetcp/Rules/main/Clash/Proxy.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/inetcp/Rules/main/Clash/Reject.list
; 基础直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
; 去广告
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
; 特殊重置
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=Ⓜ️ 微软云盘,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
; AI
ruleset=💬 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=💬 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
; 国外媒体
ruleset=🎬 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
; 国外常规
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
; 国内聚合
;ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list

; 兜底
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; 策略组
custom_proxy_group=💖 公益-234`select`[]DIRECT`^\[公益\] \| 234
custom_proxy_group=🐾 公益-宝可梦`select`[]DIRECT`^\[公益\] \| 宝可梦
custom_proxy_group=⚡ 公益自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50`^\[公益\] \|
custom_proxy_group=🛡️ 前置代理`select`[]⚡ 公益自动`^\[自用\] \|
custom_proxy_group=🛬 落地节点`select`[]DIRECT`^\[落地\] \|

custom_proxy_group=🚀 节点选择`select`[]DIRECT`^\[自用\] \|`[]💖 公益-234`[]🐾 公益-宝可梦`[]🛬 落地节点
custom_proxy_group=🏠 Home`select`[]DIRECT`^\[自用\] \|
custom_proxy_group=🏢 Work`select`[]DIRECT`^\[自用\] \|
custom_proxy_group=💬 AI`select`[]🚀 节点选择`[]🎯 全球直连`^\[自用\] \|
custom_proxy_group=Ⓜ️ 微软云盘`select`[]🚀 节点选择`[]🎯 全球直连`^\[自用\] \|
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 节点选择`^\[自用\] \|
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 节点选择`^\[自用\] \|
custom_proxy_group=🎬 国外媒体`select`[]🚀 节点选择`[]🎯 全球直连`^\[自用\] \|
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`^\[自用\] \|

enable_rule_generator=true
overwrite_original_rules=true
